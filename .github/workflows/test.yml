name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npx eslint proxy/ --max-warnings 0
      - run: npm run build:readme
      - run: node statusline/statusline.mjs < /dev/null || true

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: echo '{"model":{"id":"claude-sonnet-4-6"},"workspace":{"current_dir":"C:/Users/test/project"},"context_window":{"total_input_tokens":5000,"max_input_tokens":200000}}' | node statusline/statusline.mjs
      - run: npx eslint proxy/ --max-warnings 0
